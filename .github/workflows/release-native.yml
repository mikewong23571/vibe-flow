name: Release Native

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag, for example v0.1.0
        required: true
        type: string
      name:
        description: Release name. Defaults to the tag when empty.
        required: false
        type: string
      draft:
        description: Create as draft release
        required: true
        default: true
        type: boolean
      prerelease:
        description: Mark as prerelease
        required: true
        default: true
        type: boolean

permissions:
  contents: write

jobs:
  native:
    name: Build ${{ matrix.artifact }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact: vibe-flow-linux-x64
          - os: macos-15-intel
            artifact: vibe-flow-macos-x64
          - os: macos-latest
            artifact: vibe-flow-macos-arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup GraalVM
        uses: graalvm/setup-graalvm@v1
        with:
          java-version: "21"
          distribution: graalvm
          native-image-job-reports: true
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Clojure
        uses: DeLaGuardo/setup-clojure@13.4
        with:
          cli: latest

      - name: Cache Clojure deps
        uses: actions/cache@v4
        with:
          path: |
            ~/.m2/repository
            ~/.gitlibs
            .cpcache
            spikes/native_binary/.cpcache
          key: native-release-clojure-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('deps.edn', 'spikes/native_binary/deps.edn') }}
          restore-keys: |
            native-release-clojure-${{ runner.os }}-${{ runner.arch }}-

      - name: Build uberjar
        working-directory: spikes/native_binary
        run: clojure -T:build uber

      - name: Build native image
        working-directory: spikes/native_binary
        run: |
          native-image --no-fallback \
            --features=clj_easy.graal_build_time.InitClojureClasses \
            -jar target/vibe-flow-native-spike.jar \
            target/${{ matrix.artifact }}

      - name: Verify native binary
        working-directory: spikes/native_binary
        run: ./target/${{ matrix.artifact }} help

      - name: Package artifact
        working-directory: spikes/native_binary/target
        run: tar -czf ${{ matrix.artifact }}.tar.gz ${{ matrix.artifact }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: spikes/native_binary/target/${{ matrix.artifact }}.tar.gz
          if-no-files-found: error

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: native

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download native artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ inputs.tag }}
          RELEASE_NAME: ${{ inputs.name }}
          RELEASE_DRAFT: ${{ inputs.draft }}
          RELEASE_PRERELEASE: ${{ inputs.prerelease }}
        run: |
          set -euo pipefail

          release_name="${RELEASE_NAME:-$RELEASE_TAG}"
          flags=()

          if [ "$RELEASE_DRAFT" = "true" ]; then
            flags+=(--draft)
          fi

          if [ "$RELEASE_PRERELEASE" = "true" ]; then
            flags+=(--prerelease)
          fi

          gh release create "$RELEASE_TAG" dist/*.tar.gz \
            --target "$GITHUB_SHA" \
            --title "$release_name" \
            --notes "Native Vibe Flow CLI build for $RELEASE_TAG." \
            "${flags[@]}"
